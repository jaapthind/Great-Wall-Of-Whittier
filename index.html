<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Wall Of Whittier - Ultra Edition</title>
<style>
    /* ========================================================================== */
    /* GLOBAL & RESET STYLES                                                      */
    /* ========================================================================== */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000000;
        font-family: 'Courier New', Courier, monospace;
        color: #ffffff;
        user-select: none;
    }

    #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
    }

    #introCanvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 20;
        background-color: #000;
        transition: opacity 2s ease-in-out;
    }

    /* ========================================================================== */
    /* UI ELEMENTS                                                                */
    /* ========================================================================== */
    #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 30;
        pointer-events: none;
    }

    #start-screen {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        opacity: 0;
        transition: opacity 1s;
        pointer-events: auto;
    }

    .main-title {
        font-size: 5vw;
        color: #ff3300;
        text-shadow: 0px 0px 20px #ff0000, 5px 5px 0px #550000;
        margin-bottom: 10px;
        font-weight: 900;
        letter-spacing: 5px;
        text-transform: uppercase;
    }

    .sub-title {
        font-size: 2vw;
        color: #00ffff;
        text-shadow: 0px 0px 10px #00aaff;
        margin-bottom: 40px;
    }

    #start-btn {
        background: linear-gradient(135deg, #ff3300, #990000);
        border: 4px solid #ffaa00;
        color: #ffffff;
        font-size: 2.5vw;
        padding: 20px 60px;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        box-shadow: 0px 10px 30px rgba(255, 50, 0, 0.5);
        transition: all 0.1s ease;
    }

    #start-btn:hover {
        transform: scale(1.1);
        box-shadow: 0px 15px 40px rgba(255, 100, 0, 0.8);
    }

    #start-btn:active {
        transform: scale(0.95);
    }

    /* ========================================================================== */
    /* HUD ELEMENTS                                                               */
    /* ========================================================================== */
    #hud {
        display: none;
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px #000;
    }

    .hud-stat {
        margin-bottom: 10px;
        padding: 10px 20px;
        background: rgba(0, 0, 0, 0.5);
        border-left: 5px solid #ff3300;
        border-radius: 0 10px 10px 0;
    }

    #health-bar-container {
        width: 300px;
        height: 20px;
        background: #333;
        border: 2px solid #fff;
        margin-top: 10px;
    }

    #health-bar {
        width: 100%;
        height: 100%;
        background: #00ff00;
        transition: width 0.2s, background 0.2s;
    }

    /* ========================================================================== */
    /* GAME OVER UI                                                               */
    /* ========================================================================== */
    #game-over-screen {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 0, 0, 0.9);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: auto;
    }

    .game-over-text {
        font-size: 8vw;
        color: #ff0000;
        text-shadow: 0 0 30px #ff0000;
        margin-bottom: 20px;
    }

    #final-stats {
        font-size: 3vw;
        color: #fff;
        margin-bottom: 40px;
        text-align: center;
    }

    #restart-btn {
        background: #00ffff;
        border: none;
        color: #000;
        font-size: 2vw;
        padding: 15px 50px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    }
    
    #restart-btn:hover {
        background: #fff;
    }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="introCanvas"></canvas>

<div id="ui-layer">
    <div id="start-screen">
        <div class="main-title">Great Wall</div>
        <div class="main-title" style="color:#ffaa00;">Of Whittier</div>
        <div class="sub-title">High Speed Orbital Drop Deployment</div>
        <button id="start-btn">INITIATE DROP</button>
    </div>

    <div id="hud">
        <div class="hud-stat" id="score-display">DISTANCE: 0M</div>
        <div class="hud-stat" id="speed-display">VELOCITY: 0 KM/H</div>
        <div id="health-bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <div id="game-over-screen">
        <div class="game-over-text">CATASTROPHIC FAILURE</div>
        <div id="final-stats">DISTANCE: 0M</div>
        <button id="restart-btn">DEPLOY AGAIN</button>
    </div>
</div>

<script>
/**
 * ============================================================================
 * GREAT WALL OF WHITTIER - ULTRA ENGINE
 * ============================================================================
 */

// --- GLOBAL VARIABLES & CONSTANTS ---
const introCanvas = document.getElementById('introCanvas');
const introCtx = introCanvas.getContext('2d');
const gameCanvas = document.getElementById('gameCanvas');
const gameCtx = gameCanvas.getContext('2d', { alpha: false });

let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;
let HALF_WIDTH = WIDTH / 2;
let HALF_HEIGHT = HEIGHT / 2;

introCanvas.width = WIDTH;
introCanvas.height = HEIGHT;
gameCanvas.width = WIDTH;
gameCanvas.height = HEIGHT;

window.addEventListener('resize', () => {
    WIDTH = window.innerWidth;
    HEIGHT = window.innerHeight;
    HALF_WIDTH = WIDTH / 2;
    HALF_HEIGHT = HEIGHT / 2;
    introCanvas.width = WIDTH;
    introCanvas.height = HEIGHT;
    gameCanvas.width = WIDTH;
    gameCanvas.height = HEIGHT;
});

// --- STATE MANAGEMENT ---
const GAME_STATE = {
    BOOT: 0,
    ORBITAL_ZOOM: 1,
    TITLE_SCREEN: 2,
    PLAYING: 3,
    CRASHING: 4,
    GAME_OVER: 5
};
let currentState = GAME_STATE.BOOT;

/**
 * ============================================================================
 * INTRO SEQUENCE: DETAILED ORBITAL ZOOM
 * ============================================================================
 */

class Starfield {
    constructor() {
        this.stars = [];
        this.numStars = 2000;
        this.warpSpeed = 0;
        this.init();
    }
    
    init() {
        for (let i = 0; i < this.numStars; i++) {
            this.stars.push({
                x: (Math.random() - 0.5) * WIDTH * 4,
                y: (Math.random() - 0.5) * HEIGHT * 4,
                z: Math.random() * WIDTH,
                pz: 0
            });
        }
    }
    
    update(dt) {
        if (this.warpSpeed < 50) this.warpSpeed += dt * 10;
        for (let i = 0; i < this.numStars; i++) {
            let s = this.stars[i];
            s.pz = s.z;
            s.z -= this.warpSpeed * dt * 60;
            if (s.z < 1) {
                s.z = WIDTH;
                s.x = (Math.random() - 0.5) * WIDTH * 4;
                s.y = (Math.random() - 0.5) * HEIGHT * 4;
                s.pz = s.z;
            }
        }
    }
    
    draw(ctx) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = '#fff';
        for (let i = 0; i < this.numStars; i++) {
            let s = this.stars[i];
            let sx = (s.x / s.z) * HALF_WIDTH + HALF_WIDTH;
            let sy = (s.y / s.z) * HALF_HEIGHT + HALF_HEIGHT;
            let r = (1 - s.z / WIDTH) * 3;
            
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.fill();
            
            // Warp trails
            if (this.warpSpeed > 10) {
                let px = (s.x / s.pz) * HALF_WIDTH + HALF_WIDTH;
                let py = (s.y / s.pz) * HALF_HEIGHT + HALF_HEIGHT;
                ctx.strokeStyle = `rgba(255,255,255,${1 - s.z/WIDTH})`;
                ctx.lineWidth = r;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
            }
        }
    }
}

class EarthZoom {
    constructor() {
        this.scale = 0.001;
        this.x = HALF_WIDTH;
        this.y = HALF_HEIGHT;
        this.targetScale = 150;
        this.rotation = 0;
        this.active = false;
        this.phase = 0;
        this.timer = 0;
    }
    
    start() {
        this.active = true;
    }
    
    update(dt) {
        if (!this.active) return;
        this.timer += dt;
        
        // Exponential zoom in
        if (this.scale < this.targetScale) {
            this.scale *= (1 + dt * 1.5);
        }
        this.rotation += dt * 0.1;
        
        // Target specific coordinates (Whittier/China simulation)
        if (this.scale > 2) {
            this.x += (HALF_WIDTH * 0.2 - this.x) * dt;
            this.y += (HALF_HEIGHT * 1.5 - this.y) * dt;
        }

        if (this.timer > 8 && currentState === GAME_STATE.ORBITAL_ZOOM) {
            document.getElementById('start-screen').style.opacity = 1;
            currentState = GAME_STATE.TITLE_SCREEN;
        }
    }
    
    draw(ctx) {
        if (!this.active) return;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(this.scale, this.scale);
        
        // Atmosphere glow
        let glow = ctx.createRadialGradient(0, 0, 90, 0, 0, 120);
        glow.addColorStop(0, 'rgba(0, 100, 255, 0.8)');
        glow.addColorStop(1, 'rgba(0, 100, 255, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 120, 0, Math.PI*2);
        ctx.fill();
        
        // Ocean base
        ctx.fillStyle = '#0a2e5c';
        ctx.beginPath();
        ctx.arc(0, 0, 100, 0, Math.PI*2);
        ctx.fill();
        
        // Continents (Procedural abstract)
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath();
        // Eurasia/China mass
        ctx.moveTo(-50, -40);
        ctx.bezierCurveTo(-30, -80, 40, -90, 70, -30);
        ctx.bezierCurveTo(90, 10, 60, 60, 20, 50);
        ctx.bezierCurveTo(-20, 40, -80, 20, -50, -40);
        ctx.fill();
        
        // Desert biomes
        ctx.fillStyle = '#c0ca33';
        ctx.beginPath();
        ctx.arc(30, -20, 20, 0, Math.PI*2);
        ctx.fill();
        
        // Clouds
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(-20, -20, 30, 0, Math.PI*2);
        ctx.arc(40, 40, 40, 0, Math.PI*2);
        ctx.fill();
        
        // Target Reticle
        if (this.scale > 5) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 1 / this.scale;
            let rx = 30;
            let ry = -10;
            ctx.beginPath();
            ctx.arc(rx, ry, 5, 0, Math.PI*2);
            ctx.moveTo(rx - 10, ry); ctx.lineTo(rx + 10, ry);
            ctx.moveTo(rx, ry - 10); ctx.lineTo(rx, ry + 10);
            ctx.stroke();
        }
        
        ctx.restore();
        
        // Hyper-speed entry overlay
        if (this.scale > 50) {
            ctx.fillStyle = `rgba(255, 255, 255, ${(this.scale - 50) / 100})`;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
        }
    }
}

const starfield = new Starfield();
const earthZoom = new EarthZoom();

/**
 * ============================================================================
 * MAIN GAME ENGINE: PSEUDO-3D RACER
 * ============================================================================
 */

// --- INPUT HANDLING ---
const keys = {
    ArrowLeft: false, ArrowRight: false,
    a: false, d: false
};

window.addEventListener('keydown', (e) => {
    if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
    if(e.key.toLowerCase() === 'a') keys['ArrowLeft'] = true;
    if(e.key.toLowerCase() === 'd') keys['ArrowRight'] = true;
});

window.addEventListener('keyup', (e) => {
    if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
    if(e.key.toLowerCase() === 'a') keys['ArrowLeft'] = false;
    if(e.key.toLowerCase() === 'd') keys['ArrowRight'] = false;
});

// --- CAMERA & PROJECTION ---
const camera = {
    x: 0,
    y: 1500,
    z: 0,
    depth: 0.8,
    fov: 100
};

// --- ROAD SEGMENTS ---
const segmentLength = 200;
const drawDistance = 300;
const roadWidth = 2500;
let segments = [];
let trackLength = 0;

const COLORS = {
    SKY: '#72D7EE',
    TREE: '#005108',
    FOG: '#005108',
    LIGHT: { road: '#A0A0A0', grass: '#10AA10', rumble: '#555555', lane: '#CCCCCC' },
    DARK:  { road: '#808080', grass: '#009A00', rumble: '#BBBBBB' }
};

// --- OBSTACLES & ASSETS ---
const SPRITES = {
    BARRICADE: { w: 600, h: 400, render: drawBarricade, damage: 34 },
    ROCK:      { w: 500, h: 400, render: drawRock, damage: 25 },
    TOWER:     { w: 800, h: 2500, render: drawTower, damage: 100 },
    DRAGON:    { w: 1000, h: 800, render: drawDragon, damage: 50 }
};

// Drawing functions for pseudo-3D sprites
function drawBarricade(ctx, destX, destY, scale) {
    let w = SPRITES.BARRICADE.w * scale;
    let h = SPRITES.BARRICADE.h * scale;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(destX - w/2, destY - h, w, h);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(destX - w/2, destY - h);
    ctx.lineTo(destX + w/2, destY);
    ctx.moveTo(destX + w/2, destY - h);
    ctx.lineTo(destX - w/2, destY);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5 * scale;
    ctx.stroke();
}

function drawRock(ctx, destX, destY, scale) {
    let w = SPRITES.ROCK.w * scale;
    let h = SPRITES.ROCK.h * scale;
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(destX, destY - h/2, w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(destX - w/8, destY - h/2, w/3, 0, Math.PI*2);
    ctx.fill();
}

function drawTower(ctx, destX, destY, scale) {
    let w = SPRITES.TOWER.w * scale;
    let h = SPRITES.TOWER.h * scale;
    // Base
    ctx.fillStyle = '#3a3834';
    ctx.fillRect(destX - w/2, destY - h, w, h);
    // Roof
    ctx.fillStyle = '#8B0000';
    ctx.beginPath();
    ctx.moveTo(destX - w*0.7, destY - h);
    ctx.lineTo(destX, destY - h - w*0.8);
    ctx.lineTo(destX + w*0.7, destY - h);
    ctx.fill();
}

function drawDragon(ctx, destX, destY, scale) {
    let w = SPRITES.DRAGON.w * scale;
    let h = SPRITES.DRAGON.h * scale;
    ctx.fillStyle = '#FFD700'; // Gold dragon statue
    ctx.beginPath();
    ctx.ellipse(destX, destY - h/2, w/2, h/4, 0, 0, Math.PI*2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#DAA520';
    ctx.fillRect(destX + w/4, destY - h*0.8, w/4, h/3);
}

// --- ROAD GENERATION ---
function resetRoad() {
    segments = [];
    
    // Complex procedural generation sequence
    // Using a large builder loop to ensure massive track size
    for(let n = 0; n < 10000; n++) {
        let curve = 0;
        let y = 0;
        
        // Procedural curves
        if (n > 100 && n < 300) curve = 0.02;
        if (n > 400 && n < 600) curve = -0.03;
        if (n > 800 && n < 1200) { curve = Math.sin(n/20) * 0.04; y = Math.sin(n/10) * 20; }
        if (n > 1500 && n < 2000) { curve = 0.05; y = 40; } // Big uphill climb
        if (n > 2000 && n < 2500) { curve = -0.05; y = -40; } // Big downhill
        
        // Random continuous generation beyond initial script
        if (n > 2500) {
            curve = Math.sin(n/50) * 0.03 + Math.cos(n/15) * 0.01;
            y = Math.sin(n/30) * 15;
        }

        let segment = {
            index: n,
            z: n * segmentLength,
            curve: curve,
            y: y,
            sprites: [],
            p1: { x:0, y:0, z:0, sx:0, sy:0, w:0, scale:0 },
            p2: { x:0, y:0, z:0, sx:0, sy:0, w:0, scale:0 },
            color: Math.floor(n / 3) % 2 ? COLORS.LIGHT : COLORS.DARK
        };
        
        // Decorate environment (Towers on side)
        if (n % 40 === 0) {
            segment.sprites.push({ source: SPRITES.TOWER, offset: -1.5 });
            segment.sprites.push({ source: SPRITES.TOWER, offset: 1.5 });
        }
        
        // Place Hazards
        if (n > 100 && n % Math.floor(Math.random() * 20 + 10) === 0) {
            let offset = (Math.random() * 2) - 1; // -1 to 1
            let typeRandom = Math.random();
            let type = SPRITES.BARRICADE;
            if (typeRandom > 0.5) type = SPRITES.ROCK;
            if (typeRandom > 0.8 && n % 100 === 0) type = SPRITES.DRAGON;
            
            segment.sprites.push({ source: type, offset: offset });
        }

        segments.push(segment);
    }
    
    // Pre-calculate absolute X positions based on curves
    let dx = 0;
    for (let n = 0; n < segments.length; n++) {
        dx += segments[n].curve;
        segments[n].x = dx;
    }
    
    trackLength = segments.length * segmentLength;
}

// --- PLAYER VEHICLE ---
class Player {
    constructor() {
        this.x = 0;     // -1 (left) to 1 (right)
        this.y = 0;
        this.z = 0;
        this.speed = 0;
        this.maxSpeed = 30000;
        this.accel = 2000;
        this.breaking = -4000;
        this.decel = -1000;
        this.offRoadDecel = -3000;
        this.offRoadLimit = 5000;
        
        this.health = 100;
        this.score = 0;
        this.velX = 0;
        
        this.tilt = 0;
    }
    
    update(dt, currentSegment) {
        // Lateral movement
        if (keys.ArrowLeft) this.velX -= 0.05;
        if (keys.ArrowRight) this.velX += 0.05;
        
        this.velX *= 0.8; // Friction
        this.x += this.velX;
        
        // Centrifugal force from curves
        this.x -= (this.speed / this.maxSpeed) * currentSegment.curve * dt * 300;
        
        // Boundaries
        if (this.x < -1.2) { this.x = -1.2; this.velX = 0; }
        if (this.x > 1.2) { this.x = 1.2; this.velX = 0; }
        
        // Speed control (Auto-accelerate for runner)
        if (this.speed < this.maxSpeed) {
            this.speed += this.accel * dt;
        }
        
        // Off-road penalty
        if (this.x < -1 || this.x > 1) {
            if (this.speed > this.offRoadLimit) {
                this.speed += this.offRoadDecel * dt;
            }
        }
        
        // Move forward
        this.z += this.speed * dt;
        
        // Loop track if reached end
        if (this.z >= trackLength) {
            this.z -= trackLength;
        }
        
        this.score = Math.floor(this.z / 100);
        this.tilt = this.velX * 30; // Tilt for rendering
    }
    
    draw(ctx) {
        let px = HALF_WIDTH;
        let py = HEIGHT - 120;
        
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(this.tilt * Math.PI / 180);
        
        // Hover shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.ellipse(0, 80, 80, 20, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Jetbike Main Body
        ctx.fillStyle = '#ff1100';
        ctx.beginPath();
        ctx.moveTo(0, -60);
        ctx.lineTo(40, 40);
        ctx.lineTo(-40, 40);
        ctx.fill();
        
        // Cockpit
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(15, 10);
        ctx.lineTo(-15, 10);
        ctx.fill();
        
        // Thrusters
        let thrust = Math.random() * 20 + 20;
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.moveTo(-20, 40); ctx.lineTo(-30, 40 + thrust); ctx.lineTo(-10, 40 + thrust*0.8); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(20, 40); ctx.lineTo(30, 40 + thrust); ctx.lineTo(10, 40 + thrust*0.8); ctx.fill();
        
        ctx.restore();
    }
    
    takeDamage(amount) {
        this.health -= amount;
        this.speed *= 0.3; // Stagger
        createExplosion(HALF_WIDTH, HEIGHT - 150);
        updateHUD();
        if (this.health <= 0) {
            triggerGameOver();
        }
    }
}

let player = new Player();

// --- PARTICLE SYSTEM ---
class ParticleSystem {
    constructor() {
        this.particles = [];
    }
    
    spawn(x, y, color) {
        for(let i=0; i<40; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 30,
                vy: (Math.random() - 1) * 30,
                life: 1.0,
                color: color
            });
        }
    }
    
    update(dt) {
        for(let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 1; // Gravity
            p.life -= dt * 2;
            if(p.life <= 0) this.particles.splice(i, 1);
        }
    }
    
    draw(ctx) {
        for(let p of this.particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 10, 10);
        }
        ctx.globalAlpha = 1.0;
    }
}

const particles = new ParticleSystem();
function createExplosion(x, y) {
    particles.spawn(x, y, '#ff5500');
    particles.spawn(x, y, '#ffff00');
}

// --- PROJECTION LOGIC ---
function project(p, cameraX, cameraY, cameraZ, cameraDepth, width, height, roadWidth) {
    p.z = p.z - cameraZ;
    // Handle behind camera
    if (p.z <= 0) p.z = 1;
    
    p.scale = cameraDepth / p.z;
    p.sx = Math.round(width / 2 + (p.scale * (p.x - cameraX) * width / 2));
    p.sy = Math.round(height / 2 - (p.scale * (p.y - cameraY) * height / 2));
    p.w = Math.round(p.scale * roadWidth * width / 2);
}

function drawPolygon(ctx, x1, y1, x2, y2, x3, y3, x4, y4, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
}

function drawBackground(ctx, skyOffset) {
    // Sky
    ctx.fillStyle = COLORS.SKY;
    ctx.fillRect(0, 0, WIDTH, HEIGHT);
    
    // Sun
    ctx.fillStyle = '#ffeba3';
    ctx.beginPath();
    ctx.arc(WIDTH/2 + skyOffset * 0.5, HEIGHT*0.3, 100, 0, Math.PI*2);
    ctx.fill();
    
    // Distant Mountains
    ctx.fillStyle = '#546E7A';
    ctx.beginPath();
    ctx.moveTo(0, HEIGHT);
    
    // Procedural mountain peaks
    for (let i = 0; i <= WIDTH; i += 100) {
        let mY = HEIGHT * 0.6 + Math.sin(i * 0.01 + skyOffset * 0.005) * 100;
        ctx.lineTo(i, mY);
    }
    ctx.lineTo(WIDTH, HEIGHT);
    ctx.fill();
}

// --- CORE RENDER PIPELINE ---
function renderGame() {
    let baseSegment = segments[Math.floor(player.z / segmentLength) % segments.length];
    let basePercent = (player.z % segmentLength) / segmentLength;
    
    // Find absolute camera coordinates
    camera.x = player.x * roadWidth;
    camera.y = 1500 + baseSegment.y; 
    camera.z = player.z;
    
    let horizonY = HEIGHT/2 - (baseSegment.y * 0.5);
    let skyOffset = baseSegment.curve * 5000;
    
    drawBackground(gameCtx, skyOffset);
    
    let dx = -(baseSegment.curve * basePercent);
    let x = 0;
    let maxY = HEIGHT; 
    
    let renderList = [];
    
    // Draw Segments Back-to-Front
    for (let n = 0; n < drawDistance; n++) {
        let segmentIndex = (Math.floor(player.z / segmentLength) + n) % segments.length;
        let segment = segments[segmentIndex];
        
        // Loop track projection correction
        let loopedZ = segment.z;
        if (segmentIndex < Math.floor(player.z / segmentLength)) {
            loopedZ += trackLength;
        }

        // Setup projection points
        segment.p1.x = segment.x - x;
        segment.p1.y = segment.y;
        segment.p1.z = loopedZ;
        
        let nextSegment = segments[(segmentIndex + 1) % segments.length];
        segment.p2.x = nextSegment.x - x - dx;
        segment.p2.y = nextSegment.y;
        segment.p2.z = loopedZ + segmentLength;
        
        // Apply Curve
        x += dx;
        dx += nextSegment.curve;

        project(segment.p1, camera.x, camera.y, camera.z, camera.depth, WIDTH, HEIGHT, roadWidth);
        project(segment.p2, camera.x, camera.y, camera.z, camera.depth, WIDTH, HEIGHT, roadWidth);
        
        // Frustum Culling
        if (segment.p1.z <= camera.depth || segment.p2.sy >= maxY) continue;
        
        // Rendering Colors
        let color = segment.color;
        
        // Grass/Outside
        drawPolygon(gameCtx, 0, segment.p2.sy, WIDTH, segment.p2.sy, WIDTH, segment.p1.sy, 0, segment.p1.sy, color.grass);
        
        // Rumble strips
        let r1 = segment.p1.w * 1.2;
        let r2 = segment.p2.w * 1.2;
        drawPolygon(gameCtx, segment.p1.sx - r1, segment.p1.sy, segment.p1.sx + r1, segment.p1.sy,
                             segment.p2.sx + r2, segment.p2.sy, segment.p2.sx - r2, segment.p2.sy, color.rumble);
                             
        // Main Road (The Wall Path)
        drawPolygon(gameCtx, segment.p1.sx - segment.p1.w, segment.p1.sy, segment.p1.sx + segment.p1.w, segment.p1.sy,
                             segment.p2.sx + segment.p2.w, segment.p2.sy, segment.p2.sx - segment.p2.w, segment.p2.sy, color.road);
        
        // Center Lane Marks
        if (color.lane) {
            let l1 = segment.p1.w * 0.05;
            let l2 = segment.p2.w * 0.05;
            drawPolygon(gameCtx, segment.p1.sx - l1, segment.p1.sy, segment.p1.sx + l1, segment.p1.sy,
                                 segment.p2.sx + l2, segment.p2.sy, segment.p2.sx - l2, segment.p2.sy, color.lane);
        }

        maxY = segment.p1.sy;
        
        // Collect Sprites
        for(let i=0; i<segment.sprites.length; i++) {
            renderList.push({
                segment: segment,
                sprite: segment.sprites[i]
            });
        }
    }
    
    // Sort and Render Sprites (Back to front)
    renderList.sort((a, b) => b.segment.p1.z - a.segment.p1.z);
    
    for (let i = 0; i < renderList.length; i++) {
        let s = renderList[i];
        let spriteX = s.segment.p1.sx + (s.sprite.offset * s.segment.p1.w);
        let spriteY = s.segment.p1.sy;
        let scale = s.segment.p1.scale * WIDTH;
        
        s.sprite.source.render(gameCtx, spriteX, spriteY, scale);
        
        // Collision Detection
        if (s.segment.index === baseSegment.index + 1) { // Just ahead
            let playerXNorm = player.x;
            let spriteXNorm = s.sprite.offset;
            // Width of obstacle in normalized space
            let objWNorm = (s.sprite.source.w / roadWidth); 
            
            if (Math.abs(playerXNorm - spriteXNorm) < objWNorm) {
                // HIT!
                player.takeDamage(s.sprite.source.damage);
                s.segment.sprites.splice(s.segment.sprites.indexOf(s.sprite), 1); // Destroy on impact
            }
        }
    }
    
    player.draw(gameCtx);
    particles.draw(gameCtx);
    
    // Speed Lines Effect (Pseudo Motion Blur)
    if (player.speed > 20000) {
        gameCtx.strokeStyle = 'rgba(255,255,255,0.3)';
        gameCtx.lineWidth = 2;
        gameCtx.beginPath();
        for(let i=0; i<20; i++) {
            let lx = Math.random() * WIDTH;
            let ly = Math.random() * HEIGHT;
            gameCtx.moveTo(lx, ly);
            gameCtx.lineTo(lx, ly + Math.random() * 200 + 100);
        }
        gameCtx.stroke();
    }
}

// --- GAME LOOP & STATE HANDLERS ---
let lastTime = 0;

function updateHUD() {
    document.getElementById('score-display').innerText = `DISTANCE: ${player.score}M`;
    document.getElementById('speed-display').innerText = `VELOCITY: ${Math.floor(player.speed / 100)} KM/H`;
    
    let hb = document.getElementById('health-bar');
    let hp = Math.max(0, player.health);
    hb.style.width = `${hp}%`;
    if (hp > 60) hb.style.background = '#00ff00';
    else if (hp > 30) hb.style.background = '#ffaa00';
    else hb.style.background = '#ff0000';
}

function triggerGameOver() {
    currentState = GAME_STATE.CRASHING;
    setTimeout(() => {
        currentState = GAME_STATE.GAME_OVER;
        document.getElementById('hud').style.display = 'none';
        document.getElementById('final-stats').innerText = `DISTANCE COVERED: ${player.score}M`;
        document.getElementById('game-over-screen').style.display = 'flex';
    }, 2000);
}

function restartGame() {
    resetRoad();
    player = new Player();
    currentState = GAME_STATE.PLAYING;
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    updateHUD();
}

function gameLoop(time) {
    let dt = (time - lastTime) / 1000;
    if (isNaN(dt) || dt > 0.1) dt = 0.016; // Limit delta to prevent glitches
    lastTime = time;
    
    switch (currentState) {
        case GAME_STATE.BOOT:
            introCtx.fillStyle = '#000';
            introCtx.fillRect(0, 0, WIDTH, HEIGHT);
            currentState = GAME_STATE.ORBITAL_ZOOM;
            break;
            
        case GAME_STATE.ORBITAL_ZOOM:
            starfield.update(dt);
            starfield.draw(introCtx);
            if (starfield.warpSpeed > 20 && !earthZoom.active) {
                earthZoom.start();
            }
            earthZoom.update(dt);
            earthZoom.draw(introCtx);
            break;
            
        case GAME_STATE.TITLE_SCREEN:
            // Just draw the end state of earth zoom
            earthZoom.draw(introCtx);
            break;
            
        case GAME_STATE.PLAYING:
            player.update(dt, segments[Math.floor(player.z / segmentLength) % segments.length]);
            particles.update(dt);
            renderGame();
            updateHUD();
            break;
            
        case GAME_STATE.CRASHING:
            // Player is dead, slide to halt
            player.speed *= 0.9;
            player.z += player.speed * dt;
            particles.update(dt);
            renderGame();
            
            // Red overlay
            gameCtx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            gameCtx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Huge explosion
            if (Math.random() > 0.8) createExplosion(HALF_WIDTH + (Math.random()-0.5)*200, HEIGHT - 100 - Math.random()*200);
            break;
    }
    
    requestAnimationFrame(gameLoop);
}

    init: function() {
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        this.masterGain.gain.value = 0.5;
    },
    playTone: function(freq, type, duration) {
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
};

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function lerp(start, end, amt) {
    return (1 - amt) * start + amt * end;
}

function randomRange(min, max) {
    return Math.random() * (max - min) + min;
}

function easeOutQuart(x) {
    return 1 - Math.pow(1 - x, 4);
}

function easeInOutSine(x) {
